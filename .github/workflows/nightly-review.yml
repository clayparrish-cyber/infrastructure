name: Nightly Agent Review

on:
  push:
    paths:
      - '.github/workflows/nightly-review.yml'
      - 'agents/**'
  schedule:
    # 2am CST = 8am UTC
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      theme_override:
        description: 'Override theme (e.g., security-review, bug-hunt-review)'
        required: false
        type: string
      project_override:
        description: 'Override project (e.g., sidelineiq, dosie)'
        required: false
        type: string

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  COMMAND_CENTER_URL: ${{ secrets.COMMAND_CENTER_URL }}
  COMMAND_CENTER_API_KEY: ${{ secrets.COMMAND_CENTER_API_KEY }}

jobs:
  # ─────────────────────────────────────────────
  # Job 0: Quick validation on push (prevents "No jobs were run" failures)
  # ─────────────────────────────────────────────
  validate:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Validate workflow
        run: echo "Workflow file validated successfully"

  # ─────────────────────────────────────────────
  # Job 1: Determine today's schedule
  # ─────────────────────────────────────────────
  setup:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    outputs:
      date: ${{ steps.schedule.outputs.date }}
      dow: ${{ steps.schedule.outputs.dow }}
      theme: ${{ steps.schedule.outputs.theme }}
      tier: ${{ steps.schedule.outputs.tier }}
    steps:
      - name: Determine schedule
        id: schedule
        run: |
          DATE=$(date +%Y-%m-%d)
          DOW=$(date +%u)         # 1=Mon, 7=Sun
          WEEK_NUM=$(date +%V)    # ISO week number

          echo "date=$DATE" >> "$GITHUB_OUTPUT"
          echo "dow=$DOW" >> "$GITHUB_OUTPUT"

          # Check for theme override from manual dispatch
          if [ -n "${{ inputs.theme_override }}" ]; then
            echo "theme=${{ inputs.theme_override }}" >> "$GITHUB_OUTPUT"
            echo "tier=0" >> "$GITHUB_OUTPUT"
            echo "Using override theme: ${{ inputs.theme_override }} (tier 0 = all projects)"
            exit 0
          fi

          # Day-of-week to theme mapping
          case "$DOW" in
            1) THEME="security-review";       TIER=1 ;;
            2) THEME="ux-layout-review";      TIER=1 ;;
            3) THEME="bug-hunt-review";       TIER=1 ;;
            4) THEME="content-value-review";  TIER=1 ;;
            5) THEME="polish-brand-review";   TIER=1 ;;
            6)
              # Saturday: rotating theme based on week number
              THEMES=("security-review" "ux-layout-review" "bug-hunt-review" "content-value-review" "polish-brand-review")
              INDEX=$(( WEEK_NUM % 5 ))
              THEME="${THEMES[$INDEX]}"
              TIER=2
              ;;
            7) THEME="weekly-cleanup";        TIER=0 ;;
          esac

          echo "theme=$THEME" >> "$GITHUB_OUTPUT"
          echo "tier=$TIER" >> "$GITHUB_OUTPUT"
          echo "Schedule: $DATE (DOW=$DOW, week=$WEEK_NUM) -> theme=$THEME, tier=$TIER"

  # ─────────────────────────────────────────────
  # Job 2: Clone project repositories
  # ─────────────────────────────────────────────
  clone-projects:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout infrastructure repo
        uses: actions/checkout@v4

      - name: Clone project repos
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          TIER: ${{ needs.setup.outputs.tier }}
          PROJECT_OVERRIDE: ${{ inputs.project_override }}
        run: |
          mkdir -p projects

          # Read project repos from registry.json
          REGISTRY="agents/registry.json"

          # Determine which projects to clone based on tier
          if [ -n "$PROJECT_OVERRIDE" ]; then
            # Manual override: only clone the specified project
            PROJECT_INFO=$(python3 -c "
          import json
          with open('$REGISTRY') as f:
              reg = json.load(f)
          p = reg['projects'].get('$PROJECT_OVERRIDE', {})
          print(f\"{p.get('repo', '')}|{p.get('subdir', '')}\")
          ")
            IFS='|' read -r REPO SUBDIR <<< "$PROJECT_INFO"
            if [ -n "$REPO" ]; then
              echo "Cloning override project: $PROJECT_OVERRIDE ($REPO)"
              if [ -n "$SUBDIR" ]; then
                git clone --depth 1 "https://${GH_PAT}@github.com/${REPO}.git" "projects/${PROJECT_OVERRIDE}_fullclone"
                cp -r "projects/${PROJECT_OVERRIDE}_fullclone/$SUBDIR" "projects/$PROJECT_OVERRIDE"
                rm -rf "projects/${PROJECT_OVERRIDE}_fullclone"
              else
                git clone --depth 1 "https://${GH_PAT}@github.com/${REPO}.git" "projects/$PROJECT_OVERRIDE"
              fi
            else
              echo "ERROR: Project '$PROJECT_OVERRIDE' not found in registry"
              exit 1
            fi
          else
            # Determine project list from tier (includes subdir info)
            PROJECTS=$(python3 -c "
          import json
          with open('$REGISTRY') as f:
              reg = json.load(f)
          tier = int('$TIER')
          if tier == 0:
              projects = list(reg['projects'].keys())
          elif tier == 1:
              projects = reg['tiers']['1']['projects']
          elif tier == 2:
              projects = reg['tiers']['2']['projects']
          else:
              projects = []
          for p in projects:
              proj = reg['projects'][p]
              repo = proj.get('repo', '')
              subdir = proj.get('subdir', '')
              print(f'{p}|{repo}|{subdir}')
          ")

            # Clone each project (handle shared repos, subdirectories, and failures gracefully)
            declare -A REPO_CLONE_DIRS
            CLONE_FAILURES=0

            while IFS='|' read -r PROJECT_ID REPO SUBDIR; do
              [ -z "$PROJECT_ID" ] && continue
              if [ -z "$REPO" ]; then
                echo "WARNING: No repo found for $PROJECT_ID, skipping"
                continue
              fi

              # Check if this repo was already cloned
              if [ -n "${REPO_CLONE_DIRS[$REPO]:-}" ]; then
                CLONE_SRC="${REPO_CLONE_DIRS[$REPO]}"
                echo "Reusing clone of $REPO for $PROJECT_ID"
                if [ -n "$SUBDIR" ]; then
                  cp -r "$CLONE_SRC/$SUBDIR" "projects/$PROJECT_ID" 2>/dev/null || {
                    echo "WARNING: Subdir '$SUBDIR' not found in $REPO for $PROJECT_ID"
                    cp -r "$CLONE_SRC" "projects/$PROJECT_ID"
                  }
                else
                  cp -r "$CLONE_SRC" "projects/$PROJECT_ID"
                fi
                continue
              fi

              # Clone the repo
              CLONE_DIR="projects/_clone_${PROJECT_ID}"
              echo "Cloning $PROJECT_ID from $REPO"
              if git clone --depth 1 "https://${GH_PAT}@github.com/${REPO}.git" "$CLONE_DIR"; then
                REPO_CLONE_DIRS[$REPO]="$CLONE_DIR"
                if [ -n "$SUBDIR" ]; then
                  if [ -d "$CLONE_DIR/$SUBDIR" ]; then
                    cp -r "$CLONE_DIR/$SUBDIR" "projects/$PROJECT_ID"
                    echo "Extracted subdir '$SUBDIR' for $PROJECT_ID"
                  else
                    echo "WARNING: Subdir '$SUBDIR' not found, using full repo for $PROJECT_ID"
                    cp -r "$CLONE_DIR" "projects/$PROJECT_ID"
                  fi
                else
                  mv "$CLONE_DIR" "projects/$PROJECT_ID"
                  REPO_CLONE_DIRS[$REPO]="projects/$PROJECT_ID"
                fi
              else
                echo "WARNING: Failed to clone $REPO for $PROJECT_ID, skipping"
                CLONE_FAILURES=$((CLONE_FAILURES + 1))
              fi
            done <<< "$PROJECTS"

            # Clean up temp clone directories
            rm -rf projects/_clone_* 2>/dev/null || true

            # Fail only if NO projects were cloned
            CLONED_COUNT=$(ls -d projects/*/ 2>/dev/null | wc -l | tr -d ' ')
            if [ "$CLONED_COUNT" -eq 0 ]; then
              echo "ERROR: No projects were cloned successfully"
              exit 1
            fi

            if [ "$CLONE_FAILURES" -gt 0 ]; then
              echo "WARNING: $CLONE_FAILURES clone(s) failed, but $CLONED_COUNT project(s) available"
            fi
          fi

          echo "Projects cloned ($CLONED_COUNT):"
          ls -la projects/

      - name: Upload projects artifact
        uses: actions/upload-artifact@v4
        with:
          name: projects
          path: projects/
          retention-days: 1

  # ─────────────────────────────────────────────
  # Job 3: Orchestrator decides tonight's roster
  # ─────────────────────────────────────────────
  orchestrator:
    runs-on: ubuntu-latest
    needs: [setup, clone-projects]
    outputs:
      roster: ${{ steps.determine-roster.outputs.roster }}
      use_orchestrator: ${{ steps.determine-roster.outputs.use_orchestrator }}
    steps:
      - name: Checkout infrastructure repo
        uses: actions/checkout@v4

      - name: Download projects artifact
        uses: actions/download-artifact@v4
        with:
          name: projects
          path: projects/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install agent lib dependencies
        run: cd ${{ github.workspace }}/agents/lib && npm ci

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Collect orchestrator signals
        continue-on-error: true
        env:
          PROJECTS_DIR: ${{ github.workspace }}/projects
          SCANNER_PATH: ${{ github.workspace }}/agents/lib/git-activity-scanner.sh
          SIGNALS_OUTPUT: ${{ github.workspace }}/signals.json
        run: |
          chmod +x "${{ github.workspace }}/agents/lib/git-activity-scanner.sh"
          npx tsx ${{ github.workspace }}/agents/lib/collect-orchestrator-signals.ts

      - name: Run orchestrator
        continue-on-error: true
        run: |
          # Copy signals into agents/ directory so the orchestrator prompt can find it
          if [ -f "${{ github.workspace }}/signals.json" ]; then
            cp "${{ github.workspace }}/signals.json" "${{ github.workspace }}/agents/signals.json"
          else
            echo '{}' > "${{ github.workspace }}/agents/signals.json"
          fi

          # Run orchestrator from workspace root (it reads agents/registry.json and agents/signals.json)
          cd ${{ github.workspace }}
          claude -p "$(cat agents/orchestrator/decide-roster.md)" --max-turns 30 --allowedTools "Read,Write,Edit,Glob,Grep,Bash"

      - name: Determine roster
        id: determine-roster
        env:
          THEME: ${{ needs.setup.outputs.theme }}
          TIER: ${{ needs.setup.outputs.tier }}
          DATE: ${{ needs.setup.outputs.date }}
          PROJECT_OVERRIDE: ${{ inputs.project_override }}
        run: |
          # Check if orchestrator produced a valid roster
          if [ -f "${{ github.workspace }}/roster.json" ]; then
            # Validate it's proper JSON with a roster array
            if python3 -c "
          import json, sys
          with open('${{ github.workspace }}/roster.json') as f:
              data = json.load(f)
          assert 'roster' in data and isinstance(data['roster'], list)
          print(f'Orchestrator roster: {len(data[\"roster\"])} entries')
          "; then
              ROSTER=$(cat "${{ github.workspace }}/roster.json")
              echo "use_orchestrator=true" >> "$GITHUB_OUTPUT"
              echo "Using orchestrator-generated roster"
            else
              echo "Orchestrator roster.json invalid, falling back to static"
              ROSTER=""
            fi
          else
            echo "No roster.json found, falling back to static schedule"
            ROSTER=""
          fi

          # Fallback: generate static roster
          if [ -z "$ROSTER" ]; then
            ROSTER=$(python3 -c "
          import json, sys

          with open('${{ github.workspace }}/agents/registry.json') as f:
              reg = json.load(f)

          theme = '$THEME'
          tier = int('$TIER')
          date = '$DATE'
          project_override = '$PROJECT_OVERRIDE'

          # Determine projects
          if project_override:
              projects = [project_override]
          elif tier == 0:
              projects = list(reg['projects'].keys())
          elif tier == 1:
              projects = reg['tiers']['1']['projects']
          elif tier == 2:
              projects = reg['tiers']['2']['projects']
          else:
              projects = []

          # Build roster: run the theme agent on each project
          roster = []
          priority = 1
          for project in projects:
              roster.append({
                  'agent_id': theme,
                  'project': project,
                  'priority': priority,
                  'reason': f'Static schedule: {theme} on tier {tier}'
              })
              priority += 1

          output = {
              'date': date,
              'roster': roster,
              'source': 'static-fallback'
          }

          print(json.dumps(output))
          ")
            echo "use_orchestrator=false" >> "$GITHUB_OUTPUT"
            echo "Using static fallback roster"
          fi

          # Write roster to output (escape for GitHub Actions)
          # Use a delimiter approach for multiline JSON
          EOF_MARKER=$(dd if=/dev/urandom bs=15 count=1 2>/dev/null | base64)
          echo "roster<<${EOF_MARKER}" >> "$GITHUB_OUTPUT"
          echo "$ROSTER" >> "$GITHUB_OUTPUT"
          echo "${EOF_MARKER}" >> "$GITHUB_OUTPUT"

          echo "Final roster:"
          echo "$ROSTER" | python3 -m json.tool

  # ─────────────────────────────────────────────
  # Job 4: Run agent reviews
  # ─────────────────────────────────────────────
  reviews:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: [setup, clone-projects, orchestrator]
    steps:
      - name: Checkout infrastructure repo
        uses: actions/checkout@v4

      - name: Download projects artifact
        uses: actions/download-artifact@v4
        with:
          name: projects
          path: projects/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Create logs directory
        run: mkdir -p ${{ github.workspace }}/logs

      - name: Create usage extraction script
        run: |
          cat > ${{ github.workspace }}/extract-usage.py << 'PYEOF'
          import json, sys

          output_json, usage_file, agent_id, project_id = sys.argv[1:5]
          try:
              d = json.load(open(output_json))
              u = d.get('usage', {})
              mu = d.get('modelUsage', {})
              usage = {
                  'agent_id': agent_id,
                  'project': project_id,
                  'total_cost_usd': d.get('total_cost_usd', 0),
                  'tokens_input': u.get('input_tokens', 0),
                  'tokens_output': u.get('output_tokens', 0),
                  'cache_creation_tokens': u.get('cache_creation_input_tokens', 0),
                  'cache_read_tokens': u.get('cache_read_input_tokens', 0),
                  'duration_ms': d.get('duration_ms', 0),
                  'model': list(mu.keys())[0] if mu else 'unknown',
                  'num_turns': d.get('num_turns', 0),
              }
              json.dump(usage, open(usage_file, 'w'), indent=2)
              cost = usage['total_cost_usd']
              ti = usage['tokens_input']
              to = usage['tokens_output']
              print(f'Usage: ${cost:.4f} USD, {ti}+{to} tokens')
          except Exception as e:
              print(f'WARNING: Could not extract usage: {e}', file=sys.stderr)
              sys.exit(1)
          PYEOF

      - name: Run reviews
        env:
          DATE: ${{ needs.setup.outputs.date }}
          ROSTER_JSON: ${{ needs.orchestrator.outputs.roster }}
          REVIEW_AGENT_TIMEOUT_SECONDS: '900'
        run: |
          WORKSPACE="${{ github.workspace }}"
          REGISTRY="$WORKSPACE/agents/registry.json"

          echo "=== Roster ==="
          echo "$ROSTER_JSON" | python3 -m json.tool
          echo "==============="

          # Parse roster and run each agent-project pair sequentially
          ENTRIES=$(echo "$ROSTER_JSON" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for entry in data.get('roster', []):
              print(f\"{entry['agent_id']}|{entry['project']}\")
          ")

          SUCCESS_COUNT=0
          FAIL_COUNT=0
          SKIP_COUNT=0
          TIMEOUT_COUNT=0

          while IFS='|' read -r AGENT_ID PROJECT_ID; do
            [ -z "$AGENT_ID" ] && continue

            echo ""
            echo "=========================================="
            echo "Running: $AGENT_ID on $PROJECT_ID"
            echo "=========================================="

            # Determine project directory
            PROJECT_DIR="$WORKSPACE/projects/$PROJECT_ID"
            if [ ! -d "$PROJECT_DIR" ]; then
              echo "SKIP: Project directory not found: $PROJECT_DIR"
              SKIP_COUNT=$((SKIP_COUNT + 1))
              continue
            fi

            # Determine prompt file
            if [ "$AGENT_ID" = "weekly-cleanup" ]; then
              PROMPT_FILE="$WORKSPACE/agents/ops/weekly-cleanup.md"
            else
              PROMPT_FILE="$WORKSPACE/agents/reviews/$PROJECT_ID/$AGENT_ID.md"
            fi

            if [ ! -f "$PROMPT_FILE" ]; then
              echo "SKIP: Prompt file not found: $PROMPT_FILE"
              SKIP_COUNT=$((SKIP_COUNT + 1))
              continue
            fi

            # Create reports directory inside the project
            mkdir -p "$PROJECT_DIR/reports"

            # Get max_turns from registry (default 50)
            MAX_TURNS=$(python3 -c "
          import json
          with open('$REGISTRY') as f:
              reg = json.load(f)
          for agent in reg.get('agents', []):
              if agent['id'] == '$AGENT_ID':
                  print(agent.get('maxTurns', 50))
                  break
          else:
              print(50)
          ")

            echo "Prompt: $PROMPT_FILE"
            echo "Max turns: $MAX_TURNS"
            echo "Working directory: $PROJECT_DIR"

            # Fetch prior rejections for this project to avoid re-flagging
            REJECTIONS=$(curl -s \
              -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
              -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
              "$SUPABASE_URL/rest/v1/work_items?status=eq.rejected&project=eq.$PROJECT_ID&rejection_reason=not.is.null&select=title,rejection_reason&limit=50" \
              | python3 -c "
            import json, sys
            items = json.load(sys.stdin)
            if not items:
                print('')
            else:
                lines = []
                for i in items:
                    lines.append(f'- **{i[\"title\"]}**: {i[\"rejection_reason\"]}')
                print('\n'.join(lines))
            " 2>/dev/null || echo "")

            # Build augmented prompt with rejection context
            BASE_PROMPT=$(cat "$PROMPT_FILE")
            if [ -n "$REJECTIONS" ]; then
              REJECTION_SECTION="$(printf '\n\n## Prior Rejections — DO NOT Re-Flag These Patterns\n\nThe following findings were previously flagged and rejected by the team. Do not file similar findings. Learn from these rejection reasons to calibrate your severity thresholds:\n\n%s' "$REJECTIONS")"
              AUGMENTED_PROMPT="${BASE_PROMPT}${REJECTION_SECTION}"
            else
              AUGMENTED_PROMPT="$BASE_PROMPT"
            fi

            # Run the review agent
            LOG_FILE="$WORKSPACE/logs/$DATE-$AGENT_ID-$PROJECT_ID.log"
            OUTPUT_JSON="$WORKSPACE/logs/$DATE-$AGENT_ID-$PROJECT_ID-output.json"
            USAGE_FILE="$PROJECT_DIR/reports/$DATE-$AGENT_ID-usage.json"

            cd "$PROJECT_DIR"
            if timeout --signal=TERM --kill-after=30s "$REVIEW_AGENT_TIMEOUT_SECONDS" \
              claude -p "$AUGMENTED_PROMPT" --max-turns "$MAX_TURNS" --output-format json --allowedTools "Read,Write,Edit,Glob,Grep,Bash" > "$OUTPUT_JSON" 2>"$LOG_FILE"; then
              echo "SUCCESS: $AGENT_ID on $PROJECT_ID"
              SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
              # Extract usage data to sidecar file for sync step
              python3 "$WORKSPACE/extract-usage.py" "$OUTPUT_JSON" "$USAGE_FILE" "$AGENT_ID" "$PROJECT_ID" || true
            else
              EXIT_CODE=$?
              if [ "$EXIT_CODE" -eq 124 ] || [ "$EXIT_CODE" -eq 137 ]; then
                echo "TIMEOUT: $AGENT_ID on $PROJECT_ID exceeded ${REVIEW_AGENT_TIMEOUT_SECONDS}s"
                TIMEOUT_COUNT=$((TIMEOUT_COUNT + 1))
              else
                echo "FAILED: $AGENT_ID on $PROJECT_ID (exit code: $EXIT_CODE)"
              fi
              FAIL_COUNT=$((FAIL_COUNT + 1))
            fi
            cd "$WORKSPACE"

          done <<< "$ENTRIES"

          echo ""
          echo "=========================================="
          echo "Review Summary"
          echo "=========================================="
          echo "Success: $SUCCESS_COUNT"
          echo "Failed:  $FAIL_COUNT"
          echo "Skipped: $SKIP_COUNT"
          echo "Timeout: $TIMEOUT_COUNT"

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: projects/*/reports/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs
          path: logs/
          retention-days: 7
          if-no-files-found: ignore

  # ─────────────────────────────────────────────
  # Job 5: Sync reports to Supabase
  # ─────────────────────────────────────────────
  sync:
    runs-on: ubuntu-latest
    needs: [setup, reviews]
    if: always() && needs.reviews.result != 'cancelled'
    steps:
      - name: Checkout infrastructure repo
        uses: actions/checkout@v4

      - name: Download reports artifact
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: reports
          path: artifact-reports/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install agent lib dependencies
        run: cd ${{ github.workspace }}/agents/lib && npm ci

      - name: Reorganize reports for sync script
        run: |
          # The artifact saves files as artifact-reports/{project}/reports/*.json
          # The sync script expects reports/{project}/*.json
          mkdir -p ${{ github.workspace }}/reports

          if [ -d "${{ github.workspace }}/artifact-reports" ]; then
            for project_dir in ${{ github.workspace }}/artifact-reports/*/; do
              [ -d "$project_dir" ] || continue
              PROJECT_ID=$(basename "$project_dir")

              # Reports are nested: artifact-reports/{project}/reports/*.json
              REPORTS_SUBDIR="$project_dir/reports"
              if [ -d "$REPORTS_SUBDIR" ]; then
                mkdir -p "${{ github.workspace }}/reports/$PROJECT_ID"
                cp -r "$REPORTS_SUBDIR"/*.json "${{ github.workspace }}/reports/$PROJECT_ID/" 2>/dev/null || true
                echo "Copied reports for $PROJECT_ID"
              fi
            done
          fi

          echo "Reports directory structure:"
          find ${{ github.workspace }}/reports -name "*.json" -type f 2>/dev/null || echo "No JSON reports found"

      - name: Sync reports to Supabase
        env:
          REPORTS_DIR: ${{ github.workspace }}/reports
          REGISTRY_PATH: ${{ github.workspace }}/agents/registry.json
          DATE: ${{ needs.setup.outputs.date }}
        run: |
          # Sync each project that has reports
          if [ -d "${{ github.workspace }}/reports" ]; then
            for project_dir in ${{ github.workspace }}/reports/*/; do
              [ -d "$project_dir" ] || continue
              PROJECT_ID=$(basename "$project_dir")

              echo "Syncing $PROJECT_ID reports for $DATE..."
              npx tsx ${{ github.workspace }}/agents/lib/sync-to-supabase.ts "$PROJECT_ID" --date "$DATE" || {
                echo "WARNING: Sync failed for $PROJECT_ID"
              }
            done
          else
            echo "No reports directory found, nothing to sync"
          fi

          echo "Sync complete"

  # ─────────────────────────────────────────────
  # Job 6: Run worker agents on approved items
  # ─────────────────────────────────────────────
  workers:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [setup, clone-projects, sync]
    if: always() && needs.sync.result != 'cancelled' && needs.sync.result != 'failure'
    steps:
      - name: Checkout infrastructure repo
        uses: actions/checkout@v4

      - name: Download projects artifact
        uses: actions/download-artifact@v4
        with:
          name: projects
          path: projects/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Check for approved items
        id: check-items
        run: |
          ITEM_COUNT=$(curl -s \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            "$SUPABASE_URL/rest/v1/work_items?status=eq.approved&assigned_to=is.null&select=id&limit=1" \
            | python3 -c "import sys,json; print(len(json.load(sys.stdin)))" 2>/dev/null || echo 0)

          echo "approved_count=$ITEM_COUNT" >> "$GITHUB_OUTPUT"

          if [ "$ITEM_COUNT" -eq 0 ]; then
            echo "No approved work items to process. Skipping workers."
          else
            echo "Found approved work items — running workers"
          fi

      - name: Create logs directory
        if: steps.check-items.outputs.approved_count != '0'
        run: mkdir -p logs

      - name: Run workers
        if: steps.check-items.outputs.approved_count != '0'
        env:
          PROJECTS_DIR: ${{ github.workspace }}/projects
          WORKER_PROMPT: ${{ github.workspace }}/agents/workers/implement-finding.md
          REGISTRY: ${{ github.workspace }}/agents/registry.json
          LOG_DIR: ${{ github.workspace }}/logs
          MAX_WORKER_ITEMS: '5'
          EXECUTION_MODE: 'dry_run'
        run: |
          chmod +x ${{ github.workspace }}/agents/workers/work-loop-manager.sh
          ${{ github.workspace }}/agents/workers/work-loop-manager.sh

      - name: Upload worker logs
        if: always() && steps.check-items.outputs.approved_count != '0'
        uses: actions/upload-artifact@v4
        with:
          name: worker-logs
          path: logs/*worker*
          retention-days: 7
          if-no-files-found: ignore

  # ─────────────────────────────────────────────
  # Job 7: Reconcile stale findings
  # ─────────────────────────────────────────────
  reconcile:
    runs-on: ubuntu-latest
    needs: [setup, clone-projects, sync]
    if: always() && needs.sync.result == 'success'
    steps:
      - name: Checkout infrastructure repo
        uses: actions/checkout@v4

      - name: Download projects artifact
        uses: actions/download-artifact@v4
        with:
          name: projects
          path: projects/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Check for stale approved items
        id: check-stale
        run: |
          CUTOFF=$(date -u -d '7 days ago' +%Y-%m-%dT%H:%M:%SZ)
          STALE_COUNT=$(curl -s \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            "$SUPABASE_URL/rest/v1/work_items?status=eq.approved&created_at=lt.$CUTOFF&select=id&limit=1" \
            | python3 -c "import sys,json; print(len(json.load(sys.stdin)))" 2>/dev/null || echo 0)

          echo "stale_count=$STALE_COUNT" >> "$GITHUB_OUTPUT"

          if [ "$STALE_COUNT" -eq 0 ]; then
            echo "No stale approved items found. Skipping reconciliation."
          else
            echo "Found stale approved items — running reconciliation agent"
          fi

      - name: Create logs directory
        if: steps.check-stale.outputs.stale_count != '0'
        run: mkdir -p logs

      - name: Run reconciliation per project
        if: steps.check-stale.outputs.stale_count != '0'
        timeout-minutes: 30
        env:
          PROJECTS_DIR: ${{ github.workspace }}/projects
          RECONCILE_PROMPT: ${{ github.workspace }}/agents/reviews/reconcile-stale.md
          REGISTRY: ${{ github.workspace }}/agents/registry.json
          DATE: ${{ needs.setup.outputs.date }}
        run: |
          WORKSPACE="${{ github.workspace }}"

          # Get list of all projects from registry
          PROJECTS=$(python3 -c "
          import json
          with open('$REGISTRY') as f:
              reg = json.load(f)
          for p in reg['projects']:
              print(p)
          ")

          while read -r PROJECT_ID; do
            [ -z "$PROJECT_ID" ] && continue
            PROJECT_DIR="$WORKSPACE/projects/$PROJECT_ID"

            if [ ! -d "$PROJECT_DIR" ]; then
              echo "SKIP: No cloned dir for $PROJECT_ID"
              continue
            fi

            echo ""
            echo "=========================================="
            echo "Reconciling: $PROJECT_ID"
            echo "=========================================="

            LOG_FILE="$WORKSPACE/logs/$DATE-reconcile-$PROJECT_ID.log"

            cd "$PROJECT_DIR"
            set -o pipefail
            if PROJECT="$PROJECT_ID" PROJECT_DIR="$PROJECT_DIR" \
              claude -p "$(cat "$WORKSPACE/agents/reviews/reconcile-stale.md")" \
              --max-turns 30 \
              --allowedTools "Read,Glob,Grep,Bash" 2>&1 | tee "$LOG_FILE"; then
              echo "SUCCESS: Reconciliation for $PROJECT_ID"
            else
              echo "WARNING: Reconciliation failed for $PROJECT_ID (exit code: $?)"
            fi
            cd "$WORKSPACE"

          done <<< "$PROJECTS"

      - name: Upload reconciliation logs
        if: always() && steps.check-stale.outputs.stale_count != '0'
        uses: actions/upload-artifact@v4
        with:
          name: reconcile-logs
          path: logs/*reconcile*
          retention-days: 7
          if-no-files-found: ignore
