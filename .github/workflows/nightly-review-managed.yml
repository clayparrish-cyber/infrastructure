name: Nightly Review (Managed Agents)

on:
  schedule:
    # 09:00 UTC = 1 hour after the classic nightly-review (08:00 UTC).
    # During the cutover window both pipelines run: classic in dry-run
    # via its default flag, managed in dry-run via the default input.
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run mode — reviewers tag findings as dryrun-* so Command Center can filter.'
        required: false
        type: choice
        default: 'true'
        options:
          - 'true'
          - 'false'

concurrency:
  group: nightly-review-managed
  cancel-in-progress: false

jobs:
  managed-nightly:
    name: Managed Nightly Review
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      COMMAND_CENTER_API_KEY: ${{ secrets.COMMAND_CENTER_API_KEY }}
      COMMAND_CENTER_URL: ${{ secrets.COMMAND_CENTER_URL }}
      GH_APP_ID: ${{ secrets.GH_APP_ID }}
      GH_APP_PRIVATE_KEY: ${{ secrets.GH_APP_PRIVATE_KEY }}
      MANAGED_AGENTS_CONCURRENCY: '8'
      MANAGED_AGENTS_MAX_SPEND_USD: '20'
    steps:
      - name: Checkout infrastructure repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: agents/lib
        run: npm ci

      - name: Generate GitHub App installation token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: clayparrish-cyber

      - name: Compute dry-run flag
        id: flag
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
        run: |
          if [ "$EVENT_NAME" = "schedule" ]; then
            echo "dry=true" >> "$GITHUB_OUTPUT"
          elif [ "$INPUT_DRY_RUN" = "false" ]; then
            echo "dry=false" >> "$GITHUB_OUTPUT"
          else
            echo "dry=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run managed-agents nightly
        env:
          GH_APP_INSTALLATION_TOKEN: ${{ steps.app-token.outputs.token }}
          DRY: ${{ steps.flag.outputs.dry }}
        run: |
          if [ "$DRY" = "true" ]; then
            DRY_FLAG="--dry-run"
          else
            DRY_FLAG=""
          fi
          echo "Running with flag: $DRY_FLAG"
          npx tsx agents/lib/managed/run-nightly.ts $DRY_FLAG

      - name: Upload logs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: managed-nightly-logs-${{ github.run_id }}
          path: |
            logs/managed/
          if-no-files-found: ignore
          retention-days: 14
