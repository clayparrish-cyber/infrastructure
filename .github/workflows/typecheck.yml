name: Type Check

on:
  push:
    branches: [main]
    paths:
      - 'agents/lib/**'
      - 'packages/agent-learning/**'
      - '.github/workflows/typecheck.yml'
  pull_request:
    branches: [main]
    paths:
      - 'agents/lib/**'
      - 'packages/agent-learning/**'

jobs:
  auth-contract-check:
    name: Contract check (command-center auth header)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enforce Authorization Bearer for command-center calls
        run: |
          if grep -RIn 'x-api-key: \$COMMAND_CENTER_API_KEY' .github scripts agents; then
            echo "Found x-api-key usage with COMMAND_CENTER_API_KEY. Use Authorization: Bearer instead."
            exit 1
          fi

  typecheck-agents-lib:
    name: Type check (agents/lib)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agents/lib
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: agents/lib/package-lock.json
      - run: npm ci
      - name: Security audit
        run: npm audit --audit-level=critical
      - name: Type check
        run: npx tsc --noEmit

  typecheck-agent-learning:
    name: Type check (packages/agent-learning)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/agent-learning
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: packages/agent-learning/package-lock.json
      - run: npm ci
      - name: Security audit
        run: npm audit --audit-level=critical
      - name: Test suite
        run: npm test
      - name: Type check
        run: npx tsc --noEmit
